name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: [self-hosted, linux, x64, isolated]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Determine version
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing: $VERSION"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          STATUS=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${VERSION}")
          if [ "$STATUS" = "200" ]; then
            echo "Release ${VERSION} already exists — skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clean up RC tags and releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          # Previous version on main (before this merge) — catches RCs
          # created before a mid-PR version bump (e.g. 0.8.6-rc.* when
          # releasing 0.8.7).
          PREV_VERSION=$(git show HEAD~1:manifest.json 2>/dev/null | jq -r '.version' 2>/dev/null || echo "")

          RELEASES_JSON=$(curl --fail -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100")

          for v in "$VERSION" "$PREV_VERSION"; do
            [ -z "$v" ] && continue
            echo "Cleaning up ${v}-rc.* releases"
            echo "$RELEASES_JSON" \
              | jq -r --arg prefix "${v}-rc." '.[] | select(.tag_name | startswith($prefix)) | "\(.id) \(.tag_name)"' \
              | while read -r id tag; do
                  [ -z "$id" ] && continue
                  echo "  Deleting release: $tag (id=$id)"
                  curl --fail -sS -X DELETE \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer $GH_TOKEN" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "https://api.github.com/repos/${{ github.repository }}/releases/${id}" || true
                done
          done

          # Safety net: delete any orphaned RC git tags for both versions
          git fetch --tags
          for v in "$VERSION" "$PREV_VERSION"; do
            [ -z "$v" ] && continue
            git tag -l "${v}-rc.*" | while read -r tag; do
              [ -z "$tag" ] && continue
              echo "  Deleting orphaned tag: $tag"
              git push origin ":refs/tags/$tag" 2>/dev/null || true
            done
          done

      - name: Create release tag
        if: steps.check.outputs.exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          NOTES=$(printf 'Release %s' "$VERSION")
          BODY=$(jq -nc --arg tag "$VERSION" --arg name "$VERSION" --arg notes "$NOTES" \
            '{tag_name: $tag, name: $name, body: $notes, prerelease: false, draft: false, generate_release_notes: true}')
          RELEASE=$(curl --fail -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "$BODY")
          UPLOAD_URL=$(echo "$RELEASE" | jq -r '.upload_url' | sed 's/{?name,label}//')
          for asset in main.js manifest.json styles.css; do
            curl --fail -sS -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${asset}" \
              "${UPLOAD_URL}?name=${asset}" > /dev/null
          done
          echo "Released $VERSION with main.js manifest.json styles.css"

      - name: Verify release flags
        if: steps.check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          META=$(curl --fail -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${VERSION}")
          PRERELEASE=$(echo "$META" | jq -r '.prerelease')
          DRAFT=$(echo "$META" | jq -r '.draft')
          if [ "$PRERELEASE" != "false" ] || [ "$DRAFT" != "false" ]; then
            echo "::error::Stable release ${VERSION} has prerelease=$PRERELEASE draft=$DRAFT (expected false/false)"
            exit 1
          fi
          echo "Verified ${VERSION} is published as stable (prerelease=false, draft=false)"
