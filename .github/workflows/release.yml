name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: [self-hosted, linux, x64, isolated]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Determine version
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing: $VERSION"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "Release ${{ steps.version.outputs.version }} already exists — skipping"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clean up RC tags and releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"

          # Previous version on main (before this merge) — catches RCs
          # created before a mid-PR version bump (e.g. 0.8.6-rc.* when
          # releasing 0.8.7).
          PREV_VERSION=$(git show HEAD~1:manifest.json 2>/dev/null | jq -r '.version' 2>/dev/null || echo "")

          for v in "$VERSION" "$PREV_VERSION"; do
            [ -z "$v" ] && continue
            echo "Cleaning up ${v}-rc.* releases"
            gh release list --limit 100 --json tagName --jq '.[].tagName' \
              | grep "^${v}-rc\." \
              | while read -r tag; do
                  echo "  Deleting release: $tag"
                  gh release delete "$tag" --yes --cleanup-tag
                done || true
          done

          # Safety net: delete any orphaned RC git tags for both versions
          git fetch --tags
          for v in "$VERSION" "$PREV_VERSION"; do
            [ -z "$v" ] && continue
            git tag -l "${v}-rc.*" | while read -r tag; do
              echo "  Deleting orphaned tag: $tag"
              git push origin ":refs/tags/$tag" 2>/dev/null || true
            done
          done

      - name: Create release tag
        if: steps.check.outputs.exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            main.js manifest.json styles.css \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes
