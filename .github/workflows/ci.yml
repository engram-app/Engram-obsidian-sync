name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: [self-hosted, linux, x64, isolated]
    steps:
      - uses: actions/checkout@v6

      - run: bun install --frozen-lockfile

      - name: Security audit
        run: bun audit

      - name: Lint (biome)
        run: bunx biome check src tests

      - name: Lint (Obsidian community reviewer rules)
        run: bun run lint:obsidian

      - name: Lint CSS (stylelint, mirrors dashboard CSS checks)
        run: bun run lint:css

      - name: Type-check and build
        run: bun run build

      - name: Run tests
        run: bun test

  # Trigger backend E2E after plugin passes — tests full Obsidian ↔ backend sync
  trigger-e2e:
    needs: build-and-test
    if: github.ref != 'refs/heads/main'
    runs-on: [self-hosted, linux, x64, isolated]
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.ENGRAM_CI_CLIENT_ID }}
          private-key: ${{ secrets.ENGRAM_CI_APP_PRIVATE_KEY }}
          owner: engram-app
          repositories: Engram

      - name: Trigger backend E2E
        run: |
          curl --fail -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            https://api.github.com/repos/engram-app/Engram/dispatches \
            -d '{"event_type":"plugin-e2e-trigger","client_payload":{"plugin_ref":"${{ github.sha }}","plugin_branch":"${{ github.ref_name }}"}}'
