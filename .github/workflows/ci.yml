name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Security audit
        run: bun audit

      - name: Lint
        run: bunx biome check src tests

      - name: Type-check and build
        run: bun run build

      - name: Run tests
        run: bun test

  # Trigger backend E2E after plugin passes — tests full Obsidian ↔ backend sync
  trigger-e2e:
    needs: build-and-test
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend E2E
        run: |
          curl --fail -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.CROSS_REPO_PAT }}" \
            https://api.github.com/repos/Rasbandit/Engram/dispatches \
            -d '{"event_type":"plugin-e2e-trigger","client_payload":{"plugin_ref":"${{ github.sha }}","plugin_branch":"${{ github.ref_name }}"}}'
