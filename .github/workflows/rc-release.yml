name: RC Pre-release

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  rc-release:
    runs-on: [self-hosted, linux, x64, isolated]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Determine RC version
        id: rc
        run: |
          set -euo pipefail
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          git fetch --tags
          HIGHEST=$(git tag -l "${VERSION}-rc.*" \
            | sed "s/${VERSION}-rc\.//" \
            | sort -n \
            | tail -1)

          if [[ -z "$HIGHEST" ]]; then
            RC_NUM=1
          else
            RC_NUM=$((HIGHEST + 1))
          fi

          RC_TAG="${VERSION}-rc.${RC_NUM}"
          echo "rc_tag=$RC_TAG" >> "$GITHUB_OUTPUT"
          echo "RC tag: $RC_TAG"

      - name: Create RC tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.rc.outputs.rc_tag }}" "${{ github.event.pull_request.head.sha }}"
          git push origin "${{ steps.rc.outputs.rc_tag }}"

      - name: Create RC pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RC_TAG: ${{ steps.rc.outputs.rc_tag }}
          VERSION: ${{ steps.rc.outputs.version }}
          PR_NUM: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          BRANCH_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          NOTES=$(printf 'RC build for v%s from PR #%s\n\nCommit: %s\nBranch: %s\n\nInstall via BRAT with frozen version: `%s`' \
            "$VERSION" "$PR_NUM" "$COMMIT_SHA" "$BRANCH_REF" "$RC_TAG")
          BODY=$(jq -nc --arg tag "$RC_TAG" --arg name "$RC_TAG" --arg notes "$NOTES" \
            '{tag_name: $tag, name: $name, body: $notes, prerelease: true, draft: false}')
          RELEASE=$(curl --fail -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "$BODY")
          UPLOAD_URL=$(echo "$RELEASE" | jq -r '.upload_url' | sed 's/{?name,label}//')
          for asset in main.js manifest.json styles.css; do
            curl --fail -sS -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${asset}" \
              "${UPLOAD_URL}?name=${asset}" > /dev/null
          done
          echo "Released $RC_TAG with main.js manifest.json styles.css"

      - name: Verify RC flags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RC_TAG: ${{ steps.rc.outputs.rc_tag }}
        run: |
          set -euo pipefail
          META=$(curl --fail -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${RC_TAG}")
          PRERELEASE=$(echo "$META" | jq -r '.prerelease')
          if [ "$PRERELEASE" != "true" ]; then
            echo "::error::RC release ${RC_TAG} has prerelease=$PRERELEASE (expected true) — would pollute Obsidian listing"
            exit 1
          fi
          echo "Verified ${RC_TAG} is marked prerelease=true"
