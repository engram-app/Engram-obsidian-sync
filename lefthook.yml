# Git hooks via lefthook (replaces husky + lint-staged).
#
# Install hooks: `bun install` runs `lefthook install` via the prepare script.
# Manual install: `bunx lefthook install`.
# Bypass once:    `git commit --no-verify` or `git push --no-verify`.

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "{src,tests}/**/*.ts"
      run: bun biome check --write {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: tests-and-version-bump
      run: |
        if [ -n "${CI:-}" ] || [ -n "${GITHUB_ACTIONS:-}" ]; then
          exit 0
        fi

        bun test

        current_branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$current_branch" = "main" ] || [ "$current_branch" = "HEAD" ]; then
          exit 0
        fi
        if ! git rev-parse --verify --quiet origin/main >/dev/null; then
          exit 0
        fi

        for file in package.json manifest.json; do
          branch_v=$(node -p "require('./$file').version" 2>/dev/null || true)
          main_v=$(git show "origin/main:$file" 2>/dev/null \
            | node -e "let s='';process.stdin.on('data',c=>s+=c).on('end',()=>{try{console.log(JSON.parse(s).version)}catch(_){}})" \
            || true)
          if [ -n "$branch_v" ] && [ -n "$main_v" ] && [ "$branch_v" = "$main_v" ]; then
            cat >&2 <<EOF
        ✖ pre-push: $file version ($branch_v) has not been bumped from main.

          Bump with: npm version patch --no-git-tag-version
          (this updates package.json, manifest.json, versions.json together)

          To push WIP without bumping: git push --no-verify
        EOF
            exit 1
          fi
        done

        echo "✓ pre-push: plugin version differs from main"
